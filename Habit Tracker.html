function genHeatmap(rate = 0.75) {
  const today = new Date(2026, 4, 4);
  const set = new Set();
  for (let i = 0; i < 180; i++) {
    const d = new Date(today.getTime() - i * 86400000);
    if (Math.random() < rate) set.add(d.toISOString().slice(0, 10));
  }
  return set;
}

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  function setTweak(keyOrObj, val) {
    const patch = typeof keyOrObj === 'string' ? { [keyOrObj]: val } : keyOrObj;
    setValues(prev => ({ ...prev, ...patch }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  }
  return [values, setTweak];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    function onMsg(e) {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    }
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  if (!open) return null;
  return (
    <div style={{
      position: 'fixed', bottom: '90px', right: '16px', zIndex: 999,
      background: T.colors.bgCard, border: `1px solid ${T.colors.border}`,

  );
}

function CatFace({ color, mood, size = 80, accessory }) {
  const s = size;
  const happy = mood === 'happy', sad = mood === 'sad';
  const eyeY = s * 0.44, eyeSpacing = s * 0.17, cx = s / 2;
  const gradId = `cg${color.replace('#', '')}`;
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display: 'block' }}>
      <defs>
        <radialGradient id={gradId} cx="45%" cy="40%" r="60%">
          <stop offset="0%" stopColor={color} stopOpacity="0.95" />
          <stop offset="100%" stopColor={color} stopOpacity="0.55" />
        </radialGradient>
      </defs>
      {/* Ears */}
      <ellipse cx={cx-s*.22} cy={s*.22} rx={s*.11} ry={s*.14} fill={color} opacity=".7" transform={`rotate(-18,${cx-s*.22},${s*.22})`}/>
      <ellipse cx={cx+s*.22} cy={s*.22} rx={s*.11} ry={s*.14} fill={color} opacity=".7" transform={`rotate(18,${cx+s*.22},${s*.22})`}/>
      <ellipse cx={cx-s*.22} cy={s*.22} rx={s*.055} ry={s*.076} fill="white" opacity=".4" transform={`rotate(-18,${cx-s*.22},${s*.22})`}/>
      <ellipse cx={cx+s*.22} cy={s*.22} rx={s*.055} ry={s*.076} fill="white" opacity=".4" transform={`rotate(18,${cx+s*.22},${s*.22})`}/>
      {/* Head */}
      <ellipse cx={cx} cy={s*.54} rx={s*.38} ry={s*.35} fill={`url(#${gradId})`}/>
      {/* Eyes */}
      {happy ? (<>
        <path d={`M${cx-eyeSpacing-s*.06} ${eyeY} Q${cx-eyeSpacing} ${eyeY-s*.07} ${cx-eyeSpacing+s*.06} ${eyeY}`} stroke="white" strokeWidth={s*.035} fill="none" strokeLinecap="round" opacity=".9"/>
        <path d={`M${cx+eyeSpacing-s*.06} ${eyeY} Q${cx+eyeSpacing} ${eyeY-s*.07} ${cx+eyeSpacing+s*.06} ${eyeY}`} stroke="white" strokeWidth={s*.035} fill="none" strokeLinecap="round" opacity=".9"/>
      </>) : sad ? (<>
        <ellipse cx={cx-eyeSpacing} cy={eyeY+s*.02} rx={s*.04} ry={s*.025} fill="white" opacity=".7"/>
        <ellipse cx={cx+eyeSpacing} cy={eyeY+s*.02} rx={s*.04} ry={s*.025} fill="white" opacity=".7"/>
      </>) : (<>
        <rect x={cx-eyeSpacing-s*.055} y={eyeY-s*.015} width={s*.11} height={s*.03} rx={s*.015} fill="white" opacity=".85"/>
        <rect x={cx+eyeSpacing-s*.055} y={eyeY-s*.015} width={s*.11} height={s*.03} rx={s*.015} fill="white" opacity=".85"/>
      </>)}
      {/* Nose */}
      <ellipse cx={cx} cy={s*.56} rx={s*.04} ry={s*.025} fill="white" opacity=".6"/>
      {/* Mouth */}
      {happy
        ? <path d={`M${cx-s*.06} ${s*.60} Q${cx} ${s*.67} ${cx+s*.06} ${s*.60}`} stroke="white" strokeWidth={s*.025} fill="none" strokeLinecap="round" opacity=".7"/>
        : sad
        ? <path d={`M${cx-s*.06} ${s*.65} Q${cx} ${s*.60} ${cx+s*.06} ${s*.65}`} stroke="white" strokeWidth={s*.025} fill="none" strokeLinecap="round" opacity=".5"/>
        : <line x1={cx-s*.05} y1={s*.62} x2={cx+s*.05} y2={s*.62} stroke="white" strokeWidth={s*.025} strokeLinecap="round" opacity=".5"/>
      }
      {/* Whiskers */}
      {[[-1,s*.55],[-1,s*.62],[1,s*.55],[1,s*.62]].map(([dir,y],i) => (
        <line key={i}
          x1={cx+dir*s*.38} y1={y} x2={cx+dir*s*.16} y2={y+(dir>0?0.02:-0.02)*s}
          stroke="white" strokeWidth={s*.018} opacity=".3" strokeLinecap="round"/>
      ))}
      {/* Accessories */}
      {accessory === 'sunglasses' && (<>
        <rect x={cx-eyeSpacing-s*.09} y={eyeY-s*.06} width={s*.16} height={s*.1} rx={s*.04} fill="#2d2520" opacity=".75"/>
        <rect x={cx+eyeSpacing-s*.07} y={eyeY-s*.06} width={s*.16} height={s*.1} rx={s*.04} fill="#2d2520" opacity=".75"/>
        <line x1={cx-eyeSpacing+s*.07} y1={eyeY-.01*s} x2={cx+eyeSpacing-s*.07} y2={eyeY-.01*s} stroke="#2d2520" strokeWidth={s*.03} opacity=".75"/>
      </>)}
      {accessory === 'crown' && (
        <polygon points={`${cx-s*.14},${s*.18} ${cx-s*.14},${s*.08} ${cx},${s*.14} ${cx+s*.14},${s*.08} ${cx+s*.14},${s*.18}`} fill="#c9a96e" opacity=".9"/>
      )}
      {accessory === 'ribbon' && (<>
        <ellipse cx={cx-s*.2} cy={s*.2} rx={s*.1} ry={s*.07} fill="#e8825a" opacity=".85" transform={`rotate(-30,${cx-s*.2},${s*.2})`}/>
        <ellipse cx={cx-s*.2} cy={s*.2} rx={s*.1} ry={s*.07} fill="#e8825a" opacity=".85" transform={`rotate(30,${cx-s*.2},${s*.2})`}/>
        <circle cx={cx-s*.2} cy={s*.2} r={s*.04} fill="#f7f3ee" opacity=".9"/>
      </>)}
    </svg>
  );
}

// ─── STATS WIDGETS ────────────────────────────────────────────────────────────
function HeatmapGrid({ completions }) {
  const today = new Date(2026, 4, 4);
  const cells = [];
  for (let i = 179; i >= 0; i--) {
    const d = new Date(today.getTime() - i * 86400000);
    const key = d.toISOString().slice(0, 10);
    cells.push({ date: key, done: completions.has(key) });
  }
  const weeks = [];
  let week = [];
  const firstDay = new Date(cells[0].date).getDay();
  for (let i = 0; i < firstDay; i++) week.push(null);
  cells.forEach(c => { week.push(c); if (week.length === 7) { weeks.push(week); week = []; } });
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }
  const ML = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DL = ['S','M','T','W','T','F','S'];
  return (
    <div style={{ overflowX: 'auto' }}>
      <div style={{ display: 'flex', gap: '3px', alignItems: 'flex-start' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '3px', paddingTop: '18px' }}>
          {DL.map((d,i) => <div key={i} style={{ width: '14px', height: '14px', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '9px', color: T.colors.textMuted, fontFamily: T.font.mono }}>{i%2===1?d:''}</div>)}
        </div>
        <div>
          <div style={{ display: 'flex', gap: '3px', marginBottom: '3px', height: '16px' }}>
            {weeks.map((w, wi) => {
              const fr = w.find(c => c !== null);
              if (!fr) return <div key={wi} style={{ width: '14px' }}/>;
              const d = new Date(fr.date);
              return <div key={wi} style={{ width: '14px', fontSize: '9px', color: T.colors.textMuted, fontFamily: T.font.mono, overflow: 'visible', whiteSpace: 'nowrap' }}>{d.getDate() <= 7 ? ML[d.getMonth()] : ''}</div>;
            })}
          </div>
          <div style={{ display: 'flex', gap: '3px' }}>
            {weeks.map((w, wi) => (
              <div key={wi} style={{ display: 'flex', flexDirection: 'column', gap: '3px' }}>
                {w.map((cell, di) => (
                  <div key={di} style={{ width: '14px', height: '14px', borderRadius: '3px', background: cell === null ? 'transparent' : cell.done ? T.colors.accent : T.colors.bgMuted }}/>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

    <div style={{ background: T.colors.bgMuted, borderRadius: T.radius.md, padding: '12px 18px', display: 'flex', flexDirection: 'column', gap: '2px', minWidth: '90px' }}>
      <div style={{ fontFamily: T.font.mono, fontSize: '22px', fontWeight: 700, color: color || T.colors.text, lineHeight: 1 }}>{value}</div>
      <div style={{ fontFamily: T.font.sans, fontSize: '12px', color: T.colors.textMuted }}>{label}</div>
    </div>
  );
}

function BarChart({ data, color }) {
  const max = Math.max(...data.map(d => d.count), 1);
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: '6px', height: '104px' }}>
      {data.map((d, i) => (
        <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
          <div style={{ width: '28px', height: `${(d.count/max)*80}px`, minHeight: d.count>0?'6px':'3px', background: d.count>0?(color||T.colors.accent):T.colors.bgMuted, borderRadius: '5px 5px 3px 3px', opacity: 0.5+0.5*(i/(data.length-1||1)) }}/>
          <div style={{ fontFamily: T.font.mono, fontSize: '10px', color: T.colors.textMuted }}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ─── HABIT ROW ────────────────────────────────────────────────────────────────
function CategoryChip({ category, small }) {
  const cat = CATEGORIES.find(c => c.id === category) || { label: category, color: T.colors.textMuted };
  return (
    <span style={{ background: cat.color+'22', color: cat.color, borderRadius: T.radius.full, padding: small ? '2px 8px' : '3px 10px', fontSize: small ? '11px' : '12px', fontFamily: T.font.sans, fontWeight: 600, display: 'inline-flex', alignItems: 'center', whiteSpace: 'nowrap' }}>{cat.label}</span>
  );
}

function HabitRow({ habit, onToggle, onToggleSub, onNote, catColor }) {
  const [hov, setHov] = React.useState(false);
  const [expanded, setExpanded] = React.useState(false);
  const subs = habit.subHabits || [];
  const hasSubs = subs.length > 0;
  const subDone = subs.filter(s => s.done).length;

  return (
    <div>
      {/* Main row */}
      <div onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
        style={{ display: 'flex', alignItems: 'center', gap: '12px', padding: '13px 16px', background: hov ? T.colors.bgMuted : 'transparent', borderRadius: T.radius.md, transition: 'background 0.15s', cursor: 'default' }}>
        {/* Checkbox */}
        <button onClick={() => onToggle(habit.id)} style={{ width: '26px', height: '26px', borderRadius: T.radius.full, border: `2px solid ${habit.done ? catColor||T.colors.accent : T.colors.borderStrong}`, background: habit.done ? catColor||T.colors.accent : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, transition: 'all 0.18s' }}>
          {habit.done && <svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 4L4 7L10 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </button>
        {/* Name */}
        <span style={{ fontFamily: T.font.sans, fontWeight: 600, fontSize: '15px', color: habit.done ? T.colors.textMuted : T.colors.text, textDecoration: habit.done ? 'line-through' : 'none', transition: 'all 0.15s', minWidth: '120px', flexShrink: 0 }}>{habit.name}</span>
        {/* Chips */}
        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', flex: 1 }}>
          <CategoryChip category={habit.category} small />
          {habit.flashcard && <span style={{ background: T.colors.blueLight, color: T.colors.blue, borderRadius: T.radius.full, padding: '2px 8px', fontSize: '11px', fontFamily: T.font.sans, fontWeight: 600, whiteSpace: 'nowrap' }}>📖 Flashcard</span>}
          {/* Sub-habit progress pill */}
          {hasSubs && (
            <button onClick={() => setExpanded(e => !e)} style={{ background: (catColor||T.colors.accent)+'18', border: `1px solid ${(catColor||T.colors.accent)}33`, borderRadius: T.radius.full, padding: '2px 9px', fontSize: '11px', fontFamily: T.font.mono, color: catColor||T.colors.accent, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '4px', whiteSpace: 'nowrap', transition: 'all 0.15s' }}>
              {subDone}/{subs.length}
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" style={{ transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>
                <path d="M2 3.5L5 6.5L8 3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          )}
        </div>
        {/* Stats */}
        <div style={{ display: 'flex', gap: '14px', flexShrink: 0 }}>
          <span style={{ fontFamily: T.font.mono, fontSize: '12px', color: T.colors.textMuted, whiteSpace: 'nowrap' }}>{habit.streak > 0 ? `🔥 ${habit.streak}d` : '—'}</span>
          <span style={{ fontFamily: T.font.mono, fontSize: '12px', color: T.colors.textMuted, whiteSpace: 'nowrap' }}>{habit.rate}%</span>
        </div>
        {/* Note btn */}
        <button onClick={() => onNote(habit.id)} style={{ opacity: hov ? 0.7 : 0.15, transition: 'opacity 0.15s', background: 'none', border: 'none', cursor: 'pointer', padding: '6px', color: T.colors.textMuted, flexShrink: 0 }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 3h12v9H8l-4 3V3z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" fill="none"/></svg>
        </button>
      </div>

      {/* Sub-habits — expandable */}
      {hasSubs && expanded && (
        <div style={{ paddingLeft: '54px', paddingRight: '16px', paddingBottom: '10px', display: 'flex', flexDirection: 'column', gap: '4px' }}>
          {subs.map(sub => (
            <div key={sub.id} style={{ display: 'flex', alignItems: 'center', gap: '10px', padding: '7px 12px', borderRadius: T.radius.md, background: T.colors.bgMuted }}>
              {/* Sub checkbox — diamond shape */}
              <button onClick={() => onToggleSub(habit.id, sub.id)} style={{ width: '20px', height: '20px', borderRadius: '4px', border: `2px solid ${sub.done ? catColor||T.colors.accent : T.colors.borderStrong}`, background: sub.done ? catColor||T.colors.accent : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0, transition: 'all 0.18s', transform: 'rotate(45deg)' }}>
                {sub.done && <svg width="8" height="6" viewBox="0 0 8 6" fill="none" style={{ transform: 'rotate(-45deg)' }}><path d="M1 3L3 5L7 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </button>
              <span style={{ fontFamily: T.font.sans, fontSize: '13px', fontWeight: 500, color: sub.done ? T.colors.textMuted : T.colors.textMid, textDecoration: sub.done ? 'line-through' : 'none', transition: 'all 0.15s', flex: 1 }}>{sub.name}</span>
              {sub.done && <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" fill={(catColor||T.colors.accent)+'33'}/><path d="M4 6.5L6 8.5L9.5 4.5" stroke={catColor||T.colors.accent} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Overlay({ onClose, children }) {
  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(45,37,32,0.42)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center' }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()}>{children}</div>
    </div>
  );
}

function AddHabitModal({ onClose, onAdd }) {
  const [name, setName] = React.useState('');
  const [cat, setCat] = React.useState('health');
  const [sched, setSched] = React.useState('daily');
  const [subHabits, setSubHabits] = React.useState([]);
  const [subInput, setSubInput] = React.useState('');

  const lbl = { fontFamily: T.font.sans, fontSize: '12px', color: T.colors.textMid, fontWeight: 600, display: 'block', marginBottom: '5px' };

  function addSub() {
    const val = subInput.trim();
    if (!val) return;
    setSubHabits(prev => [...prev, { id: Date.now(), name: val, done: false }]);
    setSubInput('');
  }

  function removeSub(id) {
    setSubHabits(prev => prev.filter(s => s.id !== id));
  }

  return (
    <Overlay onClose={onClose}>
      <div style={{ ...modalBox, width: '460px', maxWidth: '92vw' }}>
        <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '20px', color: T.colors.text }}>New Habit</div>

          <label style={lbl}>Habit name</label>
          <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Learn English" style={inputStyle}/>
        </div>

        {/* Category + Schedule */}
        <div style={{ display: 'flex', gap: '12px' }}>
          <div style={{ flex: 1 }}>
            <label style={lbl}>Category</label>
            <select value={cat} onChange={e => setCat(e.target.value)} style={inputStyle}>
              {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.label}</option>)}
            </select>
          </div>
          <div style={{ flex: 1 }}>
            <label style={lbl}>Schedule</label>
            <select value={sched} onChange={e => setSched(e.target.value)} style={inputStyle}>
              <option value="daily">Daily</option>
              <option value="weekdays">Weekdays</option>
              <option value="weekends">Weekends</option>
            </select>
          </div>
        </div>

        {/* Sub-habits */}
        <div>
          <label style={lbl}>Sub-habits <span style={{ fontWeight: 400, color: T.colors.textMuted }}>— optional</span></label>

                  {/* Drag handle visual */}
                  <svg width="12" height="14" viewBox="0 0 12 14" fill="none" style={{ flexShrink: 0, opacity: 0.3 }}>
                    <circle cx="3" cy="3" r="1.5" fill={T.colors.text}/><circle cx="9" cy="3" r="1.5" fill={T.colors.text}/>
                    <circle cx="3" cy="7" r="1.5" fill={T.colors.text}/><circle cx="9" cy="7" r="1.5" fill={T.colors.text}/>
                    <circle cx="3" cy="11" r="1.5" fill={T.colors.text}/><circle cx="9" cy="11" r="1.5" fill={T.colors.text}/>
                  </svg>
                  <span style={{ flex: 1, fontFamily: T.font.sans, fontSize: '14px', color: T.colors.text }}>{sub.name}</span>
                  <button onClick={() => removeSub(sub.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: T.colors.textMuted, padding: '2px 4px', fontSize: '16px', lineHeight: 1, borderRadius: T.radius.sm }}>×</button>
                </div>

          <div style={{ display: 'flex', gap: '8px' }}>

        {/* Footer */}

// ─── REVIEW SESSION ───────────────────────────────────────────────────────────
function ReviewSession({ deck, cards, onComplete, onExit }) {
  const [idx, setIdx] = React.useState(0);
  const [flipped, setFlipped] = React.useState(false);
  const [results, setResults] = React.useState([]);
  const [done, setDone] = React.useState(false);
  const RATINGS = [
    { id: 'again', label: 'Again', color: '#e8825a', desc: '<1d' },
    { id: 'hard',  label: 'Hard',  color: '#c9a96e', desc: '+1d' },
    { id: 'good',  label: 'Good',  color: '#4caf7d', desc: '+4d' },
    { id: 'easy',  label: 'Easy',  color: '#6b9fd4', desc: '+7d' },
  ];
  const card = cards[idx];
  function rate(r) {
    const next = [...results, { cardId: card.id, rating: r }];
    setResults(next);
    if (idx + 1 >= cards.length) setDone(true);
    else { setIdx(i => i+1); setFlipped(false); }
  }
  if (done) {
    const counts = results.reduce((a,r) => { a[r.rating]=(a[r.rating]||0)+1; return a; }, {});
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '24px', padding: '60px 40px' }}>
        <div style={{ fontSize: '52px' }}>✦</div>
        <div style={{ fontFamily: T.font.sans, fontWeight: 800, fontSize: '26px', color: T.colors.text, textAlign: 'center' }}>Session complete!</div>
        <div style={{ fontFamily: T.font.sans, fontSize: '15px', color: T.colors.textMid, textAlign: 'center' }}>{cards.length} cards reviewed · Learn English habit marked ✓</div>
        <div style={{ display: 'flex', gap: '10px', flexWrap: 'wrap', justifyContent: 'center' }}>
          {RATINGS.map(r => counts[r.id] ? (
            <div key={r.id} style={{ background: r.color+'22', color: r.color, borderRadius: T.radius.md, padding: '10px 18px', textAlign: 'center', minWidth: '70px' }}>
              <div style={{ fontFamily: T.font.mono, fontSize: '22px', fontWeight: 700 }}>{counts[r.id]}</div>
              <div style={{ fontFamily: T.font.sans, fontSize: '12px', fontWeight: 600 }}>{r.label}</div>
            </div>
          ) : null)}
        </div>
        <button onClick={onComplete} style={{ padding: '12px 32px', borderRadius: T.radius.md, background: T.colors.accent, border: 'none', color: 'white', fontFamily: T.font.sans, fontWeight: 700, fontSize: '15px', cursor: 'pointer' }}>Back to Decks</button>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1 }}>
      <div style={{ padding: '18px 32px 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '8px' }}>
          <button onClick={onExit} style={{ background: 'none', border: 'none', cursor: 'pointer', fontFamily: T.font.sans, fontSize: '14px', color: T.colors.textMuted, padding: 0 }}>← Exit</button>
          <span style={{ fontFamily: T.font.mono, fontSize: '13px', color: T.colors.textMuted }}>{idx+1} / {cards.length}</span>
        </div>
        <div style={{ height: '4px', background: T.colors.bgMuted, borderRadius: T.radius.full }}>
          <div style={{ height: '100%', width: `${((idx+1)/cards.length)*100}%`, background: T.colors.accent, borderRadius: T.radius.full, transition: 'width 0.3s ease' }}/>
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '28px 32px' }}>
        <div onClick={() => setFlipped(f => !f)} style={{ width: '100%', maxWidth: '500px', minHeight: '220px', background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.xl, padding: '36px', boxShadow: T.shadow.md, cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '14px', textAlign: 'center' }}>
          {!flipped ? (<>
            <span style={{ background: T.colors.blueLight, color: T.colors.blue, borderRadius: T.radius.full, padding: '3px 12px', fontSize: '12px', fontFamily: T.font.sans, fontWeight: 600 }}>{card.partOfSpeech}</span>
            <div style={{ fontFamily: T.font.sans, fontWeight: 800, fontSize: '34px', color: T.colors.text }}>{card.word}</div>
            {card.pronunciation && <div style={{ fontFamily: T.font.mono, fontSize: '13px', color: T.colors.textMuted }}>{card.pronunciation}</div>}
            <div style={{ fontFamily: T.font.sans, fontSize: '12px', color: T.colors.textMuted, marginTop: '6px' }}>Tap to reveal</div>
          </>) : (<>
            <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '18px', color: T.colors.text }}>{card.word}</div>
            <div style={{ fontFamily: T.font.sans, fontSize: '15px', color: T.colors.textMid, lineHeight: 1.6 }}>{card.meaning}</div>
            <div style={{ fontFamily: T.font.sans, fontSize: '13px', color: T.colors.textMuted, fontStyle: 'italic', background: T.colors.bgMuted, padding: '9px 14px', borderRadius: T.radius.md, lineHeight: 1.7, width: '100%' }}>"{card.example}"</div>
          </>)}
        </div>
      </div>
      <div style={{ padding: '0 32px 28px', display: 'flex', gap: '10px' }}>
        {!flipped
          ? <button onClick={() => setFlipped(true)} style={{ flex: 1, padding: '14px', borderRadius: T.radius.md, background: T.colors.accent, border: 'none', color: 'white', fontFamily: T.font.sans, fontWeight: 700, fontSize: '15px', cursor: 'pointer' }}>Show Answer</button>
          : RATINGS.map(r => (
            <button key={r.id} onClick={() => rate(r.id)} style={{ flex: 1, padding: '11px 0', borderRadius: T.radius.md, border: `2px solid ${r.color}33`, background: r.color+'18', color: r.color, fontFamily: T.font.sans, fontWeight: 700, fontSize: '13px', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '2px' }}>
              <span>{r.label}</span>
              <span style={{ fontFamily: T.font.mono, fontSize: '10px', opacity: 0.7 }}>{r.desc}</span>
            </button>
          ))
        }
      </div>
    </div>
  );
}

function DashboardScreen({ onGoToFlashcards }) {
  const [habits, setHabits] = React.useState(INIT_HABITS);
  const [showAdd, setShowAdd] = React.useState(false);
  const [noteId, setNoteId] = React.useState(null);
  const [filter, setFilter] = React.useState('all');
  const heatmap = React.useMemo(() => genHeatmap(0.82), []);

  return (
    <div style={{ flex: 1, overflowY: 'auto' }}>
      <TopBar title={dateStr} right={

          <span style={{ fontSize: '15px' }}>+</span> New Habit

      }/>

        {/* Summary card */}
        <div className="fade-up" style={{ background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.xl, padding: '22px', display: 'flex', alignItems: 'center', gap: '20px', boxShadow: T.shadow.sm, flexWrap: 'wrap' }}>
          {/* Ring */}
          <svg width="80" height="80" viewBox="0 0 80 80" style={{ flexShrink: 0 }}>
            <circle cx="40" cy="40" r="32" fill="none" stroke={T.colors.bgMuted} strokeWidth="7"/>
            <circle cx="40" cy="40" r="32" fill="none" stroke={T.colors.accent} strokeWidth="7"
              strokeDasharray={`${2*Math.PI*32}`} strokeDashoffset={`${2*Math.PI*32*(1-done/total)}`}

            <text x="40" y="44" textAnchor="middle" fontFamily="DM Mono,monospace" fontWeight="700" fontSize="14" fill={T.colors.text}>{done}/{total}</text>
          </svg>
          {/* Text */}
          <div style={{ flex: 1, minWidth: '180px' }}>

            <div style={{ fontFamily: T.font.sans, fontSize: '13px', color: T.colors.textMuted, marginTop: '3px' }}>{Math.round(done/total*100)}% of today's habits complete</div>
            <div style={{ display: 'flex', gap: '8px', marginTop: '12px', flexWrap: 'wrap' }}>

            </div>
          </div>
          {/* Weekly chart */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '4px', flexShrink: 0 }}>
            <span style={{ fontFamily: T.font.sans, fontSize: '11px', color: T.colors.textMuted, fontWeight: 600 }}>This week</span>
            <BarChart data={weekData} color={T.colors.accent}/>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: 'flex', gap: '7px', flexWrap: 'wrap' }}>
          {['all', ...CATEGORIES.map(c => c.id)].map(cat => {
            const catObj = CATEGORIES.find(c => c.id === cat);
            const isActive = filter === cat;
            const col = catObj?.color || T.colors.accent;
            return (
              <button key={cat} onClick={() => setFilter(cat)} style={{ padding: '5px 13px', borderRadius: T.radius.full, border: `1.5px solid ${isActive ? col : T.colors.border}`, background: isActive ? col+'22' : 'transparent', color: isActive ? col : T.colors.textMid, fontFamily: T.font.sans, fontWeight: 600, fontSize: '13px', cursor: 'pointer', transition: 'all 0.15s' }}>
                {cat === 'all' ? 'All' : catObj?.label}
              </button>

        {/* Habit list */}
        <div className="fade-up" style={{ background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.xl, overflow: 'hidden', boxShadow: T.shadow.sm }}>
          {filtered.map((habit, i) => {
            const catObj = CATEGORIES.find(c => c.id === habit.category);
            return (
              <div key={habit.id} style={{ borderBottom: i < filtered.length-1 ? `1px solid ${T.colors.border}` : 'none' }}>
                <HabitRow habit={habit} catColor={catObj?.color}
                  onToggle={id => setHabits(prev => prev.map(h => h.id === id ? { ...h, done: !h.done } : h))}
                  onToggleSub={(hid, sid) => setHabits(prev => prev.map(h => h.id === hid ? { ...h, subHabits: h.subHabits.map(s => s.id === sid ? { ...s, done: !s.done } : s) } : h))}
                  onNote={id => setNoteId(id)}/>
              </div>
            );
          })}
        </div>

        {/* Heatmap */}
        <div className="fade-up" style={{ background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.xl, padding: '20px 22px', boxShadow: T.shadow.sm }}>
          <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '14px', color: T.colors.text, marginBottom: '14px' }}>
            Activity heatmap <span style={{ fontFamily: T.font.mono, fontSize: '11px', color: T.colors.textMuted, fontWeight: 400 }}>last 6 months</span>
          </div>
          <HeatmapGrid completions={heatmap}/>
        </div>
      </div>

      {showAdd && <AddHabitModal onClose={() => setShowAdd(false)} onAdd={h => setHabits(prev => [...prev, { ...h, id: Date.now(), streak: 0, longest: 0, rate: 0, done: false, note: '', flashcard: false, subHabits: h.subHabits || [] }])}/>}
      {noteHabit && <NoteModal habitName={noteHabit.name} note={noteHabit.note} onClose={() => setNoteId(null)} onSave={text => { setHabits(prev => prev.map(h => h.id === noteId ? { ...h, note: text } : h)); setNoteId(null); }}/>}
    </div>
  );
}

          {[{ms:25,label:'Tiny backpack',desc:'25-day streak on any habit',prog:12/25},{ms:50,label:'Star pendant',desc:'50-day streak on any habit',prog:12/50},{ms:7,label:'Party hat',desc:'7-day streak — Sketch Daily',prog:0}].map((m,i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '14px', padding: '11px 0', borderBottom: i<2?`1px solid ${T.colors.border}`:'none' }}>
              <div style={{ width: '34px', height: '34px', borderRadius: T.radius.md, background: T.colors.goldLight, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, fontSize: '17px' }}>🎒</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: T.font.sans, fontWeight: 600, fontSize: '13px', color: T.colors.text }}>{m.label}</div>
                <div style={{ fontFamily: T.font.sans, fontSize: '12px', color: T.colors.textMuted }}>{m.desc}</div>
                <div style={{ height: '3px', background: T.colors.bgMuted, borderRadius: T.radius.full, marginTop: '5px', overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${m.prog*100}%`, background: T.colors.gold, borderRadius: T.radius.full }}/>
                </div>
              </div>
              <span style={{ fontFamily: T.font.mono, fontSize: '11px', color: T.colors.textMuted, flexShrink: 0 }}>{Math.round(m.prog*m.ms)}/{m.ms}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function FlashcardsScreen() {
  const [view, setView] = React.useState('decks');
  const [activeDeck, setActiveDeck] = React.useState(null);
  const [decks, setDecks] = React.useState(DECKS_DATA);
  const [selectedCard, setSelectedCard] = React.useState(null);
  const [showAddCard, setShowAddCard] = React.useState(false);
  const [showAddDeck, setShowAddDeck] = React.useState(false);
  const [deckName, setDeckName] = React.useState('');
  const totalDue = decks.reduce((s,d) => s+d.dueToday, 0);
  const reviewCards = CARDS_DATA.filter(c => c.dueDate <= '2026-05-04');

  if (view === 'review' && activeDeck) {
    const cards = reviewCards.filter(c => c.deckId === activeDeck.id);
    return (
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        <TopBar title={`Review · ${activeDeck.name}`} right={null}/>
        <ReviewSession deck={activeDeck} cards={cards.length > 0 ? cards : reviewCards.slice(0,3)}
          onComplete={() => { setView('decks'); setActiveDeck(null); }}
          onExit={() => { setView('decks'); setActiveDeck(null); }}/>
      </div>
    );
  }

  if (view === 'deck-detail' && activeDeck) {
    const cards = CARDS_DATA.filter(c => c.deckId === activeDeck.id);
    const posColors = { adj: T.colors.purple, noun: T.colors.blue, verb: T.colors.green, adv: T.colors.gold, idiom: T.colors.accent };
    return (
      <div style={{ flex: 1, overflowY: 'auto' }}>
        <TopBar title={activeDeck.name} right={
          <div style={{ display: 'flex', gap: '8px' }}>
            <button onClick={() => setShowAddCard(true)} style={{ padding: '6px 13px', borderRadius: T.radius.full, background: T.colors.accent, border: 'none', color: 'white', fontFamily: T.font.sans, fontWeight: 700, fontSize: '13px', cursor: 'pointer' }}>+ Add card</button>
            <button onClick={() => { setView('decks'); setActiveDeck(null); }} style={{ background: T.colors.bgMuted, border: 'none', borderRadius: T.radius.md, padding: '6px 13px', fontFamily: T.font.sans, fontSize: '13px', color: T.colors.textMid, cursor: 'pointer', fontWeight: 600 }}>← Back</button>
          </div>
        }/>
        <div style={{ padding: '22px', display: 'flex', flexDirection: 'column', gap: '12px' }}>
          <div className="fade-up" style={{ display: 'flex', gap: '10px' }}>
            <StatPill label="Total cards" value={activeDeck.cardCount}/>
            <StatPill label="Due today" value={activeDeck.dueToday} color={T.colors.accent}/>
          </div>
          {(cards.length > 0 ? cards : CARDS_DATA).map(card => {
            const pc = posColors[card.partOfSpeech] || T.colors.textMuted;
            return (
              <div key={card.id} className="fade-up" onClick={() => setSelectedCard(card)}
                style={{ background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.lg, padding: '14px 18px', cursor: 'pointer', boxShadow: T.shadow.sm, transition: 'box-shadow 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = T.shadow.md}
                onMouseLeave={e => e.currentTarget.style.boxShadow = T.shadow.sm}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: '10px' }}>
                  <span style={{ background: pc+'22', color: pc, borderRadius: T.radius.full, padding: '2px 9px', fontSize: '11px', fontFamily: T.font.sans, fontWeight: 600, flexShrink: 0 }}>{card.partOfSpeech}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '15px', color: T.colors.text }}>{card.word}</div>
                    <div style={{ fontFamily: T.font.sans, fontSize: '13px', color: T.colors.textMuted, marginTop: '2px' }}>{card.meaning.slice(0,65)}{card.meaning.length>65?'…':''}</div>
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '4px', flexShrink: 0 }}>
                    {card.dueDate <= '2026-05-04' && <span style={{ background: T.colors.accentLight, color: T.colors.accent, borderRadius: T.radius.full, padding: '2px 7px', fontSize: '10px', fontFamily: T.font.mono }}>due</span>}
                    <span style={{ fontFamily: T.font.mono, fontSize: '10px', color: T.colors.textMuted }}>EF {card.easeFactor}</span>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        {selectedCard && <CardDetailModal card={selectedCard} onClose={() => setSelectedCard(null)}/>}
        {showAddCard && <AddCardModal onClose={() => setShowAddCard(false)} decks={decks}/>}
      </div>
    );
  }

  return (
    <div style={{ flex: 1, overflowY: 'auto' }}>
      <TopBar title="Flashcards" right={
        <button onClick={() => setShowAddDeck(true)} style={{ padding: '6px 14px', borderRadius: T.radius.full, background: T.colors.accent, border: 'none', color: 'white', fontFamily: T.font.sans, fontWeight: 700, fontSize: '13px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '5px' }}>+ New Deck</button>
      }/>
      <div style={{ padding: '22px', display: 'flex', flexDirection: 'column', gap: '18px' }}>
        {totalDue > 0 && (
          <div className="fade-up" style={{ background: `linear-gradient(135deg, ${T.colors.blueLight} 0%, ${T.colors.accentLight} 100%)`, borderRadius: T.radius.xl, padding: '18px 22px', border: `1px solid ${T.colors.border}`, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '14px' }}>
            <div>
              <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '17px', color: T.colors.text }}>{totalDue} cards due today</div>
              <div style={{ fontFamily: T.font.sans, fontSize: '13px', color: T.colors.textMid, marginTop: '2px' }}>Across {decks.filter(d=>d.dueToday>0).length} decks</div>
            </div>
            <button onClick={() => { setActiveDeck(decks.find(d=>d.dueToday>0)); setView('review'); }} style={{ padding: '10px 20px', borderRadius: T.radius.md, background: T.colors.accent, border: 'none', color: 'white', fontFamily: T.font.sans, fontWeight: 700, fontSize: '14px', cursor: 'pointer', whiteSpace: 'nowrap', flexShrink: 0 }}>Start session</button>
          </div>
        )}
        <div className="fade-up" style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(270px, 1fr))', gap: '12px' }}>
          {decks.map(deck => {
            const hasDue = deck.dueToday > 0;
            return (
              <div key={deck.id} onClick={() => { setActiveDeck(deck); setView('deck-detail'); }}
                style={{ background: T.colors.bgCard, border: `1px solid ${T.colors.border}`, borderRadius: T.radius.lg, padding: '18px 20px', cursor: 'pointer', boxShadow: T.shadow.sm, display: 'flex', flexDirection: 'column', gap: '10px', transition: 'box-shadow 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = T.shadow.md}
                onMouseLeave={e => e.currentTarget.style.boxShadow = T.shadow.sm}>
                <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '8px' }}>
                  <div>
                    <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '15px', color: T.colors.text }}>{deck.name}</div>
                    <div style={{ fontFamily: T.font.sans, fontSize: '12px', color: T.colors.textMuted, marginTop: '2px' }}>{deck.description}</div>
                  </div>
                  {hasDue && <div style={{ background: T.colors.accent, color: 'white', borderRadius: T.radius.full, padding: '2px 9px', fontSize: '11px', fontFamily: T.font.mono, fontWeight: 700, flexShrink: 0 }}>{deck.dueToday} due</div>}
                </div>
                <div style={{ display: 'flex', gap: '14px' }}>
                  <span style={{ fontFamily: T.font.mono, fontSize: '11px', color: T.colors.textMuted }}>{deck.cardCount} cards</span>
                  <span style={{ fontFamily: T.font.mono, fontSize: '11px', color: T.colors.textMuted }}>Studied {deck.lastStudied === '2026-05-04' ? 'today' : deck.lastStudied}</span>
                </div>
                <button onClick={e => { e.stopPropagation(); setActiveDeck(deck); setView('review'); }} style={{ padding: '8px 0', borderRadius: T.radius.md, border: hasDue ? 'none' : `1.5px solid ${T.colors.border}`, background: hasDue ? T.colors.accent : 'transparent', color: hasDue ? 'white' : T.colors.textMid, fontFamily: T.font.sans, fontWeight: 700, fontSize: '13px', cursor: 'pointer', transition: 'all 0.15s' }}>
                  {hasDue ? `Study ${deck.dueToday} cards` : 'Browse'}
                </button>
              </div>
            );
          })}
        </div>
      </div>
      {showAddDeck && (
        <Overlay onClose={() => setShowAddDeck(false)}>
          <div style={{ ...modalBox, width: '400px', maxWidth: '92vw' }}>
            <div style={{ fontFamily: T.font.sans, fontWeight: 700, fontSize: '20px', color: T.colors.text }}>New Deck</div>
            <input value={deckName} onChange={e => setDeckName(e.target.value)} placeholder="Deck name…" style={inputStyle}/>
            <div style={{ display: 'flex', gap: '10px', justifyContent: 'flex-end' }}>
              <button onClick={() => setShowAddDeck(false)} style={{ padding: '9px 18px', borderRadius: T.radius.md, border: `1.5px solid ${T.colors.border}`, background: 'none', fontFamily: T.font.sans, fontSize: '14px', color: T.colors.textMid, cursor: 'pointer', fontWeight: 600 }}>Cancel</button>
              <button onClick={() => { if (deckName.trim()) { setDecks(prev => [...prev, { id: Date.now(), name: deckName, description: '', cardCount: 0, dueToday: 0, lastStudied: '—' }]); setDeckName(''); setShowAddDeck(false); }}} style={{ padding: '9px 20px', borderRadius: T.radius.md, border: 'none', background: T.colors.accent, color: 'white', fontFamily: T.font.sans, fontSize: '14px', fontWeight: 700, cursor: 'pointer', opacity: deckName.trim()?1:0.45 }}>Create</button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = React.useState('dashboard');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    if (tweaks?.accent) {
      T.colors.accent = tweaks.accent;
      T.colors.accentLight = tweaks.accent + '22';
    }
  }, [tweaks?.accent]);

  return (
    <div style={{ width: '100%', height: '100vh', display: 'flex', flexDirection: 'column', background: T.colors.bg, overflow: 'hidden', fontFamily: T.font.sans }}>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {screen === 'dashboard'  && <DashboardScreen onGoToFlashcards={() => setScreen('flashcards')}/>}
        {screen === 'habits'     && <HabitsScreen/>}
        {screen === 'cats'       && <CatsScreen/>}
        {screen === 'flashcards' && <FlashcardsScreen/>}
      </div>
      <BottomNav active={screen} onNav={setScreen}/>
      <TweaksPanel>
        <TweakSection title="Accent color">
          <TweakColor label="Primary" value={tweaks.accent} onChange={v => setTweak('accent', v)}/>
        </TweakSection>
        <TweakSection title="Streaks">
          <TweakToggle label="Show emoji 🔥" value={tweaks.showStreakEmoji} onChange={v => setTweak('showStreakEmoji', v)}/>
        </TweakSection>
        <TweakSection title="Cat size">
          <TweakRadio label="" value={tweaks.catSize} options={[{value:'small',label:'S'},{value:'medium',label:'M'},{value:'large',label:'L'}]} onChange={v => setTweak('catSize', v)}/>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
